<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alarm</title>

<link rel="icon" href="./alarm.gif">

<style>
body{
    background-image:linear-gradient(180deg,#2f3d96 ,#1d9e73);
    font-family:Arial;
    height:100vh;
    overflow:hidden;
    padding:0;
    margin:0;
}

.container{
    text-align:center;
    padding-top:30px
}

#Hours,
#Minutes{
    background:#ffffff1a;
    backdrop-filter:blur(20px);
    color:#fff;
    border-radius:999px;
    padding:4px;
    border:4px solid #ffffff1a;
    width:300px;
    outline:0;
    cursor:pointer;
    font-weight:700;
    font-size:16px;
    margin:5px;
    direction:rtl;
    text-align:center
}

option{
    background:rgba(0,0,0,.1);
    color:#444;
    border-radius:999px;
    padding:4px;
}

.total{
    color:#fff;
    font-weight:700;
    font-size:25px
}

.save{
    background: linear-gradient(to top,#2f3d962c);
    backdrop-filter:blur(20px);
    color:#fff;
    border-radius:999px;
    padding:7px;
    border:none;
    width:410px;
    outline:0;
    cursor:pointer;
    font-weight:700;
    font-size:20px;
    margin:15px 5px 1px 5px;
    box-shadow:inset 0 0 20px #eeeeee8c
}

.save:hover{
    box-shadow:0 0 30px #fff
}

#play{
    width:100%;
    height:100vh;
    background:#ffffff1a;
    backdrop-filter:blur(20px);
    text-align:center;
    position:absolute;
    top:0;
    display:none;
    z-index:10
}

.close{
    background:#e4030348;
    backdrop-filter:blur(20px);
    color:#fff;
    border-radius:999px;
    padding:10px;
    border:none;
    width:300px;
    cursor:pointer;
    font-size:18px;
    margin:10px;
}

.sno{
    background:rgba(8, 12, 84, 0.438);
    backdrop-filter:blur(20px);
    color:#fff;
    border-radius:999px;
    padding:10px;
    border:none;
    width:300px;
    cursor:pointer;
    font-size:18px;
    margin:10px;
}
</style>
</head>

<body>

<!-- شاشة تشغيل المنبه -->
<div id="play">

    <img src="./alarm.gif"
         style="height:350px;border-radius:10px;margin-top:40px">

    <audio loop id="myAudio">
        <source src="alarm.mp3" type="audio/mp3">
    </audio>

    <div>
        <button onclick="clo()" class="close">
            إغلاق المنبه
        </button>

        <button onclick="sno()" class="sno">
            غفوة خمس دقائق
        </button>
    </div>

</div>

<!-- المحتوى -->
<div class="container">

    <iframe src="./clock.html"
            width="100%"
            height="350px"
            scrolling="no"
            style="border:none">
    </iframe>

    <br><br>

    <!-- اختيار الوقت -->
    <form style="display:flex;justify-content:center">

        <!-- الدقائق -->
        <select id="Minutes">
            <option value="0" selected disabled>
                اختر الدقيقة :
            </option>
        </select>

        <!-- الساعات -->
        <select id="Hours">
            <option value="0" selected disabled>
                اختر الساعة :
            </option>
        </select>

    </form>

    <button onclick="save()" class="save">
        ضبط المنبه
    </button>

    <p class="total" id="total"></p>

</div>

<!-- المطور -->
<div style="
z-index:1000;
position:absolute;
bottom:0;
text-align:center;
width:100%;
">
<h4 style="color:#fff">
Developed By
<a href="https://abdallahweb.github.io/resume/"
   style="color:#fff">
Abdallah Fouad
</a>
</h4>
</div>
<script src="./query.js"></script>
<script>

/* تعبئة الساعات */
for(let i = 1; i <= 24; i++){

    document.getElementById("Hours").innerHTML +=
    `<option value="${i}">${i}</option>`;
}

/* تعبئة الدقائق */
for(let i = 0; i <= 59; i++){

    document.getElementById("Minutes").innerHTML +=
    `<option value="${i}">${i}</option>`;
}

let alarmInterval = null;

/* حفظ المنبه */
function save(){

    if(alarmInterval !== null){
        clearInterval(alarmInterval);
    }

    document.getElementById("total").innerHTML =
    "تم ضبط المنبه بنجاح";

    alarmInterval = setInterval(checkAlarm,1000);
}

/* فحص الوقت */
function checkAlarm(){

    const now = new Date();

    const currentHours = now.getHours();
    const currentMinutes = now.getMinutes();

    const alarmHours =
    parseInt(document.getElementById("Hours").value);

    const alarmMinutes =
    parseInt(document.getElementById("Minutes").value);

    if(
        currentHours === alarmHours &&
        currentMinutes === alarmMinutes
    ){

        document.getElementById("play").style.display =
        "block";

        document.getElementById("myAudio").play();
    }
}

/* إغلاق المنبه */
function clo(){

    document.getElementById("play").style.display =
    "none";

    document.getElementById("myAudio").pause();

    document.getElementById("myAudio").currentTime = 0;
}

/* غفوة 5 دقائق */
function sno(){

    const now = new Date();

    now.setMinutes(now.getMinutes() + 5);

    document.getElementById("Hours").value =
    now.getHours();

    document.getElementById("Minutes").value =
    now.getMinutes();

    clo();

    document.getElementById("total").innerHTML =
    "تم تأجيل المنبه 5 دقائق";
}

/* ========================================= */
/* منع الكليك يمين وبعض اختصارات المطور */
/* ========================================= */

/* منع الكليك يمين */
document.addEventListener("contextmenu", e => e.preventDefault());

/* منع التحديد */
document.onselectstart = () => false;

/* منع السحب */
document.ondragstart = () => false;

/* منع الاختصارات */
document.addEventListener("keydown", function(e) {

    // F12
    if (e.keyCode == 123) {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() == "u") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() == "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() == "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() == "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() == "s") {
        e.preventDefault();
        return false;
    }

});

/* كشف فتح Developer Tools */
setInterval(function () {

    let before = new Date().getTime();

    debugger;

    let after = new Date().getTime();

    if (after - before > 100) {

        document.body.innerHTML = `
        <div style="
            background:black;
            color:red;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            font-family:Arial;
        ">
            Developer Tools ممنوعة
        </div>`;
    }

}, 1000);
</script>

</body>
</html>
